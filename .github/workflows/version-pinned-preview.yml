name: Version-Pinned Preview (staged, non-official)

# Stages the per-draft (ADR 003) report so it can be OBSERVED from a PR without
# touching official results. It publishes only under gh-pages:previews/ — never
# results/, never the landing index.html — and a scheduled reaper ages previews out.
#
# Triggers:
#   - pull_request labeled `vpm-preview`  -> runs THIS branch's workflow (no need
#       to be on main first); publishes for same-repo PRs, artifact-only for forks.
#   - workflow_dispatch (run_real)        -> available once on main; can also run
#       Tier-A real image-pinned tests and merge them over the dummy baseline.
#   - schedule                            -> reaper (prunes previews > 14 days).

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      run_real:
        description: 'Run Tier-A real image-pinned tests and merge over dummy (slower). Off = dummy only.'
        type: boolean
        default: false
  schedule:
    - cron: '0 3 * * 0'  # weekly reaper

permissions:
  contents: read

concurrency:
  group: vpm-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    # PR labeled `vpm-preview` (fast dummy preview) or `vpm-real` (real matrix run),
    # or a manual dispatch. Never on schedule.
    if: >-
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'vpm-preview') || contains(github.event.pull_request.labels.*.name, 'vpm-real')))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write       # to publish under previews/ (capped to read for fork PRs -> artifact only)
      pull-requests: write  # to post the browsable preview link as a PR comment
    steps:
      - name: Checkout PR/ref
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-site

      - name: Determine mode (real vs dummy preview)
        id: mode
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.run_real }}" = "true" ] \
             || [ "${{ contains(github.event.pull_request.labels.*.name, 'vpm-real') }}" = "true" ]; then
            echo "real=true"  >> "$GITHUB_OUTPUT"; echo "REAL matrix run"
          else
            echo "real=false" >> "$GITHUB_OUTPUT"; echo "dummy preview"
          fi

      - name: Prep images (real mode only) — build adapters + pull, like the official run
        if: steps.mode.outputs.real == 'true'
        working-directory: main
        run: |
          ./generate-certs.sh ./certs
          jq -r '.implementations[].roles[].docker.image // empty' implementations.json \
            | grep '^ghcr.io/' | sort -u | while read -r img; do docker pull "$img" || true; done
          make build-adapters || true

      - name: Build summary + render
        working-directory: main
        run: |
          set -euo pipefail
          mkdir -p out
          if [ "${{ steps.mode.outputs.real }}" = "true" ]; then
            # REAL: run the confined per-draft matrix for every even draft (all runnable
            # pairings actually execute). Structural container failures record as DNF, not
            # fail, so the report separates harness gaps from real interop results.
            for d in $(jq -r '[.implementations[].draft_versions[]?] | unique
                        | map(select((ltrimstr("draft-")|tonumber) % 2 == 0)) | .[]' implementations.json); do
              echo "::group::run $d"; TEST_TIMEOUT=60 ./run-interop-pinned.sh --draft "$d" --docker-only || true; echo "::endgroup::"
            done
            ./merge-results.sh results/*-pinned/summary.json > out/summary.json
          else
            # PREVIEW: optimistic dummy baseline (fast, no test execution).
            ./generate-dummy-results.sh > out/summary.json
          fi
          # Open Relay view: overlay REAL official negotiated (live-endpoint) results.
          OFFICIAL=$(ls -1d ../gh-pages-site/results/*/ 2>/dev/null | sort | tail -1 || true)
          if [ -n "${OFFICIAL:-}" ] && [ -f "${OFFICIAL}summary.json" ]; then
            ./seed-official-results.sh "${OFFICIAL}summary.json" > out/official.json
            if [ "${{ steps.mode.outputs.real }}" = "true" ]; then
              # per-draft view stays real; take only the open view from official
              jq '.runs |= map(select(.view=="open"))' out/official.json > out/overlay.json
            else
              cp out/official.json out/overlay.json
            fi
            ./merge-results.sh out/summary.json out/overlay.json > out/m.json && mv out/m.json out/summary.json
          fi
          ./generate-report-perdraft.sh out -o out/index.html

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-pinned-preview
          path: main/out/index.html
          retention-days: 14

      - name: Publish to gh-pages previews/ (same-repo only; off the main landing)
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SLUG="pr-${{ github.event.pull_request.number }}"
          else
            SLUG="version-pinned"
          fi
          DEST="gh-pages-site/previews/$SLUG"
          mkdir -p "$DEST"
          cp main/out/index.html "$DEST/index.html"
          cd gh-pages-site
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previews
          if git diff --cached --quiet; then
            echo "No preview change."
          else
            git commit -m "Version-pinned preview: $SLUG (staged, non-official)"
            git push origin gh-pages
          fi
          URL="${{ github.server_url }}/${{ github.repository }}"
          PAGES="https://$(echo '${{ github.repository_owner }}' | tr 'A-Z' 'a-z').github.io/$(echo '${{ github.repository }}' | cut -d/ -f2)/previews/$SLUG/"
          echo "📊 Staged preview (not official): $PAGES" >> "$GITHUB_STEP_SUMMARY"
          echo "$PAGES" > /tmp/preview_url

      - name: Comment the browsable preview link on the PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          URL=$(cat /tmp/preview_url)
          MARK="<!-- vpm-preview-link -->"
          BODY="$MARK"$'\n'"📊 **Staged per-draft preview** (non-official, off the main landing): $URL"
          # Update the existing bot comment if present, else create one (no spam on re-runs).
          ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
                 --jq "map(select(.body | contains(\"$MARK\"))) | .[0].id // empty")
          if [ -n "$ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$ID" -f body="$BODY" >/dev/null
          else
            gh api -X POST "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f body="$BODY" >/dev/null
          fi

  reap-previews:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-site
      - name: Prune previews older than 14 days
        working-directory: gh-pages-site
        run: |
          [ -d previews ] || { echo "no previews/"; exit 0; }
          find previews -mindepth 1 -maxdepth 1 -type d -mtime +14 -exec rm -rf {} +
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to reap."
          else
            git commit -m "Reap version-pinned previews older than 14 days"
            git push origin gh-pages
          fi
