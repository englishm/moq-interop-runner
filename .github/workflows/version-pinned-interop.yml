name: Version-Pinned Interop (sharded, real)

# Runs the REAL version-pinned interop matrix, SHARDED BY DRAFT: each even draft
# is an independent job (the per-draft pages are independent, so draft is a clean
# shard key). A fan-in job merges the per-draft summaries, renders the report, and
# publishes a non-official preview. The job summary reports the sharding speedup
# (sequential = sum of per-draft times, sharded = slowest single draft) so the
# wall-clock win is visible.
#
# Triggers: workflow_dispatch (manual). Real docker execution; missing images SKIP.

on:
  workflow_dispatch:
    inputs:
      publish_preview:
        description: 'Publish the rendered matrix to gh-pages previews/version-pinned-real/'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: vpm-interop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drafts:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          # Even interop drafts declared anywhere in the registry (odd drafts are
          # not interop targets and are suppressed in the report).
          DRAFTS=$(jq -c '[.implementations[].draft_versions[]?] | unique
            | map(select((ltrimstr("draft-")|tonumber) % 2 == 0)) | sort' implementations.json)
          echo "matrix={\"draft\":$DRAFTS}" >> "$GITHUB_OUTPUT"
          echo "shard drafts: $DRAFTS"

  shard:
    needs: drafts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.drafts.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate certs
        run: ./generate-certs.sh ./certs
      - name: Pull available registry images
        run: |
          jq -r '.implementations[].roles[].docker.image // empty' implementations.json \
            | grep '^ghcr.io/' | sort -u | while read -r img; do docker pull "$img" || true; done
      - name: Build adapters
        continue-on-error: true  # match the official run: build the local adapter images
        run: make build-adapters
      - name: Run pinned tests for ${{ matrix.draft }}
        run: |
          set -uo pipefail
          mkdir -p out
          start=$(date +%s)
          TEST_TIMEOUT=60 ./run-interop-pinned.sh --draft "${{ matrix.draft }}" --docker-only || true
          end=$(date +%s)
          RES=$(ls -1d results/*-pinned/ | sort | tail -1)
          cp "$RES/summary.json" "out/summary-${{ matrix.draft }}.json"
          echo "$((end - start))" > "out/duration-${{ matrix.draft }}.txt"
          echo "::notice::${{ matrix.draft }} ran in $((end - start))s ($(jq '.runs|length' "out/summary-${{ matrix.draft }}.json") cells)"
      - uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.draft }}
          path: out/
          retention-days: 14

  merge-render:
    needs: shard
    runs-on: ubuntu-latest
    permissions:
      contents: write       # publish under previews/ (read for forks -> artifact only)
    steps:
      - uses: actions/checkout@v4
        with: { path: main }
      - uses: actions/checkout@v4
        with: { ref: gh-pages, path: gh-pages-site }
      - uses: actions/download-artifact@v4
        with: { path: shards, pattern: shard-*, merge-multiple: true }
      - name: Fan-in merge + render + speedup
        working-directory: main
        run: |
          set -euo pipefail
          mkdir -p out
          # Fan-in: merge all per-draft REAL summaries into one matrix.
          ./merge-results.sh ../shards/summary-*.json > out/summary.json
          # Overlay real official remote results for the Open Relay (live endpoint) view.
          OFFICIAL=$(ls -1d ../gh-pages-site/results/*/ 2>/dev/null | sort | tail -1 || true)
          if [ -n "${OFFICIAL:-}" ] && [ -f "${OFFICIAL}summary.json" ]; then
            ./seed-official-results.sh "${OFFICIAL}summary.json" > out/official.json
            ./merge-results.sh out/summary.json out/official.json > out/m.json && mv out/m.json out/summary.json
          fi
          ./generate-report-perdraft.sh out -o out/index.html
          # Sharding speedup: sequential = sum of per-draft durations; sharded = slowest draft.
          SEQ=0; MAX=0
          for f in ../shards/duration-*.txt; do d=$(cat "$f"); SEQ=$((SEQ + d)); [ "$d" -gt "$MAX" ] && MAX=$d; done
          {
            echo "## Version-pinned sharding speedup"
            echo ""
            echo "| metric | seconds |"
            echo "|---|---|"
            echo "| Sequential (Σ per-draft) | ${SEQ} |"
            echo "| Sharded (slowest draft)  | ${MAX} |"
            awk -v s="$SEQ" -v m="$MAX" 'BEGIN{printf "| **Speedup** | **%.2fx** |\n", (m>0 ? s/m : 0)}'
            echo ""
            for f in ../shards/duration-*.txt; do
              dr=$(basename "$f" .txt | sed 's/duration-//'); echo "- ${dr}: $(cat "$f")s"
            done
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: version-pinned-real
          path: main/out/index.html
          retention-days: 14
      - name: Publish preview (same-repo only)
        if: ${{ inputs.publish_preview && github.repository_owner == 'englishm' }}
        run: |
          set -euo pipefail
          DEST="gh-pages-site/previews/version-pinned-real"
          mkdir -p "$DEST"
          cp main/out/index.html "$DEST/index.html"
          cd gh-pages-site
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previews
          if git diff --cached --quiet; then
            echo "No change."
          else
            git commit -m "Version-pinned REAL matrix (sharded, staged/non-official)"
            git push origin gh-pages
          fi
          PAGES="https://$(echo '${{ github.repository_owner }}' | tr 'A-Z' 'a-z').github.io/$(echo '${{ github.repository }}' | cut -d/ -f2)/previews/version-pinned-real/"
          echo "📊 Real sharded matrix (not official): $PAGES" >> "$GITHUB_STEP_SUMMARY"
